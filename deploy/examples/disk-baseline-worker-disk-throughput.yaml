apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: disk-baseline-worker-disk-throughput
  labels:
    app: disk-baseline-worker-disk-throughput
spec:
  serviceName: disk-baseline-worker-disk-throughput
  replicas: 3
  selector:
    matchLabels:
      app: disk-baseline-worker-disk-throughput
  template:
    metadata:
      labels:
        app: disk-baseline-worker-disk-throughput
        csl-bench.io/scrape: "true"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: disk-baseline-worker-disk-throughput
              topologyKey: kubernetes.io/hostname
      containers:
        - name: csl-bench
          image: bernhard97/csl-bench:0.3.0
          args:
            - baseline
            - -d
            - "300"
            - -m
            - disk
            - --io_file_path
            - /data/bench-data
            - --io_file_size
            - "1gb"
            - --io_read_bps
            - "10mb"
            - --io_write_bps
            - "10mb"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
